<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f0f"/>
<title>WorkClock</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Courier New',monospace;background:#0f0f0f;color:#e8e4d9}
:root{
  --bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;
  --accent:#c8a96e;--accent2:#8fb8a0;--danger:#c0604a;--info:#5b8ec4;
  --text:#e8e4d9;--muted:#7a7670;--border:#333;
  --r:4px;--r2:8px
}
input,select,textarea{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);padding:8px 12px;border-radius:var(--r);
  font-family:inherit;font-size:13px;width:100%;outline:none
}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:inherit;border-radius:var(--r);border:none;font-size:13px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border)}
@media(max-width:768px){
  .shell{flex-direction:column!important}
  .sidebar{width:100%!important;flex-direction:column!important;border-right:none!important;border-bottom:1px solid var(--border)!important;position:relative!important}
  .sidebar-header{display:flex!important;align-items:center!important;justify-content:space-between!important;padding:12px 16px!important;border-bottom:none!important;cursor:pointer}
  .sidebar-nav{display:none!important;flex-direction:column!important;padding:4px 0!important;border-top:1px solid var(--border)}
  .sidebar-nav.open{display:flex!important}
  .sidebar-logout{display:none!important}
  .sidebar-logout.open{display:block!important;border-top:1px solid var(--border)!important;padding:12px 16px!important}
  .main-content{padding:16px!important}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}
  .week-dept-grid{grid-template-columns:1fr!important}
  .emp-grid{grid-template-columns:1fr!important}
  .doc-grid{grid-template-columns:1fr!important}
  .hamburger{display:flex!important}
}
.hamburger{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:4px}
.hamburger span{width:20px;height:2px;background:var(--accent);border-radius:2px;display:block}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;

// ── Supabase client ──────────────────────────────────────────────
const SUPABASE_URL='https://wcqjdnrcqgokcyyhvjhc.supabase.co';
const SUPABASE_KEY='sb_secret_eyIWsS4pJQx8TtKOAwQJxA_GJnssG9P';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

// ── Helpers ──────────────────────────────────────────────────────
const fmt=d=>d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'--';
const fmtDate=d=>d?new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'--';
const fmtDur=ms=>{if(!ms)return'--';const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000);return`${h}h ${m}m`};
const today=()=>new Date().toISOString().split('T')[0];
const ini=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const COLORS=['#c8a96e','#8fb8a0','#5b8ec4','#c0604a','#9b8ec4','#c48e5b'];

// ── Root App ─────────────────────────────────────────────────────
function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState('login');
  const [toast,setToast]=useState(null);

  const showToast=(msg,type='ok')=>{
    setToast({msg,type});
    setTimeout(()=>setToast(null),3000);
  };

  const login=u=>{setUser(u);setView(u.es_admin?'admin':'emp')};
  const logout=()=>{setUser(null);setView('login')};

  return(
    <div style={{minHeight:'100%',background:'var(--bg)'}}>
      {toast&&(
        <div style={{
          position:'fixed',top:16,right:16,zIndex:9999,
          background:toast.type==='ok'?'var(--accent2)':'var(--danger)',
          color:'#fff',padding:'10px 18px',borderRadius:8,fontSize:13,fontWeight:'bold'
        }}>{toast.msg}</div>
      )}
      {view==='login'&&<Login onLogin={login} toast={showToast}/>}
      {view==='admin'&&user&&<Admin user={user} onLogout={logout} toast={showToast}/>}
      {view==='emp'&&user&&<Empleado user={user} onLogout={logout} toast={showToast}/>}
    </div>
  );
}

// ── Login ─────────────────────────────────────────────────────────
function Login({onLogin,toast}){
  const [empleados,setEmpleados]=useState([]);
  const [sel,setSel]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);

  useEffect(()=>{
    sb.from('empleados').select('*').eq('activo',true).order('nombre')
      .then(({data,error})=>{
        if(error)toast('Error cargando empleados','err');
        else setEmpleados(data||[]);
      });
  },[]);

  async function acceder(){
    if(!sel){setErr('Selecciona un empleado');return}
    if(!pin){setErr('Introduce tu PIN');return}
    setLoading(true);setErr('');
    const emp=empleados.find(e=>e.id===sel);
    if(!emp||emp.pin!==pin){
      setErr('PIN incorrecto');setPin('');setLoading(false);return;
    }
    setLoading(false);
    onLogin(emp);
  }

  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:11,letterSpacing:4,color:'var(--accent)',marginBottom:8,textTransform:'uppercase'}}>Sistema de fichaje</div>
          <h1 style={{fontSize:32,fontWeight:'normal',letterSpacing:3,color:'var(--text)'}}>WorkClock</h1>
          <div style={{width:40,height:1,background:'var(--accent)',margin:'12px auto 8px'}}/>
          <p style={{color:'var(--muted)',fontSize:12,letterSpacing:1}}>Control de presencia empresarial</p>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:28}}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,letterSpacing:2,color:'var(--muted)',textTransform:'uppercase',display:'block',marginBottom:6}}>Empleado</label>
            <select value={sel} onChange={e=>setSel(e.target.value)}>
              <option value=''>-- Seleccionar --</option>
              {empleados.map(e=><option key={e.id} value={e.id}>{e.nombre}{e.es_admin?' (Admin)':''}</option>)}
            </select>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,letterSpacing:2,color:'var(--muted)',textTransform:'uppercase',display:'block',marginBottom:6}}>PIN</label>
            <input type='password' value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&acceder()} placeholder='••••' maxLength={6}/>
          </div>
          {err&&<div style={{color:'var(--danger)',fontSize:12,marginBottom:12}}>{err}</div>}
          <button onClick={acceder} disabled={loading} style={{
            width:'100%',padding:11,background:'var(--accent)',color:'#0f0f0f',
            fontWeight:'bold',letterSpacing:2,textTransform:'uppercase',fontSize:12,borderRadius:4
          }}>{loading?'Verificando...':'Acceder'}</button>
        </div>
      </div>
    </div>
  );
}

// ── Admin Shell ───────────────────────────────────────────────────
function Admin({user,onLogout,toast}){
  const [tab,setTab]=useState('dashboard');
  const [menuOpen,setMenuOpen]=useState(false);
  const tabs=[
    {id:'dashboard',label:'Panel'},
    {id:'fichajes',label:'Fichajes'},
    {id:'ausencias',label:'Ausencias'},
    {id:'empleados',label:'Empleados'},
    {id:'documentos',label:'Documentos'},
  ];
  const [pendientes,setPendientes]=useState(0);
  useEffect(()=>{
    sb.from('ausencias').select('id',{count:'exact'}).eq('estado','pendiente')
      .then(({count})=>setPendientes(count||0));
  },[tab]);

  return(
    <div className="shell" style={{display:'flex',minHeight:'100vh'}}>
      <aside className="sidebar" style={{width:190,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div className="sidebar-header" style={{padding:'22px 18px',borderBottom:'1px solid var(--border)'}} onClick={()=>setMenuOpen(o=>!o)}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:'var(--accent)',marginBottom:3,textTransform:'uppercase'}}>Admin</div>
            <div style={{fontSize:14,fontWeight:'bold'}}>{user.nombre.split(' ')[0]}</div>
            <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{user.departamento}</div>
          </div>
          <div className="hamburger"><span/><span/><span/></div>
        </div>
        <nav className={`sidebar-nav${menuOpen?' open':''}`} style={{flex:1,padding:'10px 0'}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>{setTab(t.id);setMenuOpen(false)}} style={{
              display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 18px',
              background:tab===t.id?'var(--surface2)':'transparent',
              color:tab===t.id?'var(--accent)':'var(--muted)',textAlign:'left',
              fontSize:11,letterSpacing:2,textTransform:'uppercase',
              borderLeft:tab===t.id?'2px solid var(--accent)':'2px solid transparent',
              borderRight:'none',borderTop:'none',borderBottom:'none'
            }}>
              {t.label}
              {t.id==='ausencias'&&pendientes>0&&(
                <span style={{background:'var(--danger)',color:'#fff',borderRadius:10,fontSize:10,padding:'1px 6px',marginLeft:'auto'}}>{pendientes}</span>
              )}
            </button>
          ))}
        </nav>
        <button className={`sidebar-logout${menuOpen?' open':''}`} onClick={onLogout} style={{padding:'13px 18px',background:'transparent',color:'var(--muted)',fontSize:11,letterSpacing:2,textTransform:'uppercase',textAlign:'left',borderTop:'1px solid var(--border)',borderLeft:'none',borderRight:'none',borderBottom:'none'}}>
          Cerrar sesión
        </button>
      </aside>
      <main className="main-content" style={{flex:1,overflow:'auto',padding:26}}>
        {tab==='dashboard'&&<AdminDashboard/>}
        {tab==='fichajes'&&<AdminFichajes toast={toast}/>}
        {tab==='ausencias'&&<AdminAusencias toast={toast}/>}
        {tab==='empleados'&&<AdminEmpleados toast={toast}/>}
        {tab==='documentos'&&<AdminDocumentos toast={toast}/>}
      </main>
    </div>
  );
}

// ── Admin Dashboard ───────────────────────────────────────────────
function AdminDashboard(){
  const [stats,setStats]=useState({empleados:0,fichajesHoy:0,enOficina:0,pendientes:0});
  const [semana,setSemana]=useState([]);
  const [deptos,setDeptos]=useState([]);
  const [recientes,setRecientes]=useState([]);

  useEffect(()=>{
    const t=today();
    Promise.all([
      sb.from('empleados').select('id,departamento',{count:'exact'}).eq('es_admin',false).eq('activo',true),
      sb.from('fichajes').select('id,entrada,salida',{count:'exact'}).eq('fecha',t),
      sb.from('ausencias').select('id',{count:'exact'}).eq('estado','pendiente'),
      sb.from('fichajes').select('fecha').gte('fecha',getLunes()),
      sb.from('fichajes').select('id,empleado_id,fecha,entrada,salida,empleados(nombre)').order('created_at',{ascending:false}).limit(6),
    ]).then(([emps,fhoy,pend,sem,rec])=>{
      const enOf=(fhoy.data||[]).filter(f=>f.entrada&&!f.salida).length;
      setStats({
        empleados:emps.count||0,
        fichajesHoy:(fhoy.data||[]).filter(f=>f.entrada).length,
        enOficina:enOf,
        pendientes:pend.count||0,
      });
      // semana
      const dias=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
      const map={};
      (sem.data||[]).forEach(f=>{map[f.fecha]=(map[f.fecha]||0)+1});
      const semArr=dias.map((d,i)=>{
        const dt=new Date();const dow=dt.getDay()||7;
        dt.setDate(dt.getDate()-dow+i+1);
        return{dia:d,n:map[dt.toISOString().split('T')[0]]||0};
      });
      setSemana(semArr);
      // deptos
      const dm={};
      (emps.data||[]).forEach(e=>{dm[e.departamento]=(dm[e.departamento]||0)+1});
      setDeptos(Object.entries(dm));
      setRecientes(rec.data||[]);
    });
  },[]);

  function getLunes(){
    const d=new Date();const dow=d.getDay()||7;
    d.setDate(d.getDate()-dow+1);return d.toISOString().split('T')[0];
  }

  const maxS=Math.max(...semana.map(s=>s.n),1);
  const statCards=[
    {label:'Empleados',val:stats.empleados},
    {label:'Fichajes hoy',val:stats.fichajesHoy},
    {label:'En oficina',val:stats.enOficina,hi:true},
    {label:'Pendientes',val:stats.pendientes,warn:stats.pendientes>0},
  ];

  return(
    <div>
      <SH title='Panel de control' sub={fmtDate(new Date())}/>
      <div className="stat-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:22}}>
        {statCards.map((s,i)=>(
          <div key={i} style={{background:'var(--surface)',border:`1px solid ${s.hi?'var(--accent2)':s.warn?'var(--danger)':'var(--border)'}`,borderRadius:8,padding:16}}>
            <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:8,textTransform:'uppercase'}}>{s.label}</div>
            <div style={{fontSize:28,color:s.hi?'var(--accent2)':s.warn?'var(--danger)':'var(--text)'}}>{s.val}</div>
          </div>
        ))}
      </div>
      <div className="week-dept-grid" style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:14,marginBottom:22}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:14,textTransform:'uppercase'}}>Fichajes esta semana</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:72}}>
            {semana.map((s,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <div style={{width:'100%',background:s.n>0?'var(--accent)':'var(--surface2)',height:`${(s.n/maxS)*60+4}px`,minHeight:4,borderRadius:2}}/>
                <span style={{fontSize:10,color:'var(--muted)'}}>{s.dia}</span>
                {s.n>0&&<span style={{fontSize:10,color:'var(--accent)'}}>{s.n}</span>}
              </div>
            ))}
          </div>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:14,textTransform:'uppercase'}}>Por departamento</div>
          {deptos.map(([dept,n],i)=>(
            <div key={dept} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}>
                <span>{dept}</span><span style={{color:'var(--accent)'}}>{n}</span>
              </div>
              <div style={{height:3,background:'var(--surface2)',borderRadius:2}}>
                <div style={{height:'100%',background:COLORS[i%COLORS.length],width:`${(n/Math.max(...deptos.map(d=>d[1]),1))*100}%`,borderRadius:2}}/>
              </div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>
        <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:14,textTransform:'uppercase'}}>Actividad reciente</div>
        {recientes.map(r=>(
          <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
            <Av name={r.empleados?.nombre||'?'} size={26}/>
            <span style={{flex:1,fontSize:13}}>{r.empleados?.nombre}</span>
            <span style={{fontSize:11,color:'var(--muted)'}}>{fmtDate(r.fecha)}</span>
            <span style={{fontSize:11,color:'var(--accent2)'}}>↑ {fmt(r.entrada)}</span>
            {r.salida&&<span style={{fontSize:11,color:'var(--danger)'}}>↓ {fmt(r.salida)}</span>}
          </div>
        ))}
        {recientes.length===0&&<Empty txt='Sin actividad'/>}
      </div>
    </div>
  );
}

// ── Admin Fichajes ────────────────────────────────────────────────
function AdminFichajes({toast}){
  const [rows,setRows]=useState([]);
  const [emps,setEmps]=useState([]);
  const [fEmp,setFEmp]=useState('');
  const [fFecha,setFFecha]=useState('');
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    sb.from('empleados').select('id,nombre').eq('es_admin',false).order('nombre')
      .then(({data})=>setEmps(data||[]));
  },[]);

  useEffect(()=>{
    setLoading(true);
    let q=sb.from('fichajes').select('*,empleados(nombre)').order('created_at',{ascending:false});
    if(fEmp)q=q.eq('empleado_id',fEmp);
    if(fFecha)q=q.eq('fecha',fFecha);
    q.then(({data,error})=>{
      if(error)toast('Error cargando fichajes','err');
      else setRows(data||[]);
      setLoading(false);
    });
  },[fEmp,fFecha]);

  function exportCSV(){
    const lines=[['Empleado','Fecha','Entrada','Salida','Total']];
    rows.forEach(r=>{
      const dur=r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):'En curso';
      lines.push([r.empleados?.nombre||'-',r.fecha,fmt(r.entrada),r.salida?fmt(r.salida):'-',dur]);
    });
    const blob=new Blob([lines.map(l=>l.join(',')).join('\n')],{type:'text/csv'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=`fichajes_${today()}.csv`;a.click();
  }

  return(
    <div>
      <SH title='Registro de fichajes' sub={`${rows.length} registros`}>
        <Btn label='Exportar CSV' onClick={exportCSV}/>
      </SH>
      <div style={{display:'flex',gap:10,marginBottom:14}}>
        <select value={fEmp} onChange={e=>setFEmp(e.target.value)} style={{width:200}}>
          <option value=''>Todos los empleados</option>
          {emps.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}
        </select>
        <input type='date' value={fFecha} onChange={e=>setFFecha(e.target.value)} style={{width:160}}/>
        {(fEmp||fFecha)&&<Btn label='Limpiar' ghost onClick={()=>{setFEmp('');setFFecha('')}}/>}
      </div>
      {loading?<Loading/>:(
        <Tabla cols={['Empleado','Fecha','Entrada','Salida','Total','Estado']}>
          {rows.map(r=>{
            const dur=r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):null;
            return(
              <tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'9px 10px'}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <Av name={r.empleados?.nombre||'?'} size={22}/><span style={{fontSize:13}}>{r.empleados?.nombre}</span>
                  </div>
                </td>
                <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(r.fecha)}</td>
                <td style={{padding:'9px 10px',fontSize:12,color:'var(--accent2)'}}>↑ {fmt(r.entrada)}</td>
                <td style={{padding:'9px 10px',fontSize:12,color:'var(--danger)'}}>{r.salida?`↓ ${fmt(r.salida)}`:'-'}</td>
                <td style={{padding:'9px 10px',fontSize:12}}>{dur||'-'}</td>
                <td style={{padding:'9px 10px'}}><Badge label={r.salida?'Completo':'En curso'} c={r.salida?'var(--accent2)':'var(--accent)'}/></td>
              </tr>
            );
          })}
        </Tabla>
      )}
      {!loading&&rows.length===0&&<Empty txt='No hay fichajes'/>}
    </div>
  );
}

// ── Admin Ausencias ───────────────────────────────────────────────
function AdminAusencias({toast}){
  const [rows,setRows]=useState([]);
  const [loading,setLoading]=useState(true);

  const load=useCallback(()=>{
    setLoading(true);
    sb.from('ausencias').select('*,empleados(nombre)').order('created_at',{ascending:false})
      .then(({data,error})=>{
        if(error)toast('Error','err');
        else setRows(data||[]);
        setLoading(false);
      });
  },[]);

  useEffect(load,[load]);

  async function cambiarEstado(id,estado){
    const {error}=await sb.from('ausencias').update({estado}).eq('id',id);
    if(error)toast('Error al actualizar','err');
    else{toast(estado==='aprobada'?'Ausencia aprobada':'Ausencia rechazada');load();}
  }

  return(
    <div>
      <SH title='Gestión de ausencias' sub={`${rows.filter(r=>r.estado==='pendiente').length} pendientes`}/>
      {loading?<Loading/>:(
        <Tabla cols={['Empleado','Tipo','Desde','Hasta','Motivo','Estado','Acciones']}>
          {rows.map(a=>(
            <tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'9px 10px'}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <Av name={a.empleados?.nombre||'?'} size={22}/><span style={{fontSize:13}}>{a.empleados?.nombre}</span>
                </div>
              </td>
              <td style={{padding:'9px 10px',fontSize:12}}>{a.tipo}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(a.desde)}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(a.hasta)}</td>
              <td style={{padding:'9px 10px',fontSize:12,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.motivo}</td>
              <td style={{padding:'9px 10px'}}><Badge label={a.estado} c={a.estado==='aprobada'?'var(--accent2)':a.estado==='rechazada'?'var(--danger)':'var(--accent)'}/></td>
              <td style={{padding:'9px 10px'}}>
                {a.estado==='pendiente'&&(
                  <div style={{display:'flex',gap:6}}>
                    <button onClick={()=>cambiarEstado(a.id,'aprobada')} style={{background:'var(--accent2)',color:'#0f0f0f',padding:'4px 10px',fontSize:11,borderRadius:4}}>✓</button>
                    <button onClick={()=>cambiarEstado(a.id,'rechazada')} style={{background:'var(--danger)',color:'#fff',padding:'4px 10px',fontSize:11,borderRadius:4}}>✗</button>

      )}

    </div>
  );
}

// ── Admin Empleados ───────────────────────────────────────────────
function AdminEmpleados({toast}){
  const [emps,setEmps]=useState([]);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({nombre:'',email:'',cargo:'',departamento:'',pin:''});
  const [loading,setLoading]=useState(true);

  const load=useCallback(()=>{
    sb.from('empleados').select('*').eq('es_admin',false).order('nombre')
      .then(({data})=>{setEmps(data||[]);setLoading(false)});
  },[]);
  useEffect(load,[load]);

  async function guardar(){
    if(!form.nombre||!form.email||!form.pin){toast('Nombre, email y PIN son obligatorios','err');return}
    const {error}=await sb.from('empleados').insert({...form,es_admin:false,activo:true});
    if(error)toast('Error: '+error.message,'err');
    else{toast('Empleado añadido');setForm({nombre:'',email:'',cargo:'',departamento:'',pin:''});setShow(false);load();}
  }

  async function eliminar(id){
    if(!confirm('¿Eliminar empleado?'))return;
    const {error}=await sb.from('empleados').update({activo:false}).eq('id',id);
    if(error)toast('Error','err');else{toast('Empleado eliminado');load();}
  }

  return(
    <div>
      <SH title='Empleados' sub={`${emps.length} registrados`}>
        <Btn label='+ Añadir' onClick={()=>setShow(!show)}/>
      </SH>
      {show&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:8,padding:18,marginBottom:18}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:14,textTransform:'uppercase'}}>Nuevo empleado</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            {[['nombre','Nombre completo'],['email','Email'],['cargo','Cargo'],['departamento','Departamento'],['pin','PIN (4-6 dígitos)']].map(([k,p])=>(
              <input key={k} placeholder={p} value={form[k]} onChange={e=>setForm(f=>({...f,[k]:e.target.value}))} maxLength={k==='pin'?6:undefined}/>
            ))}
          </div>
          <div style={{display:'flex',gap:8}}>
            <Btn label='Guardar' onClick={guardar}/>
            <Btn label='Cancelar' ghost onClick={()=>setShow(false)}/>
          </div>
        </div>
      )}
      {loading?<Loading/>:(
        <div className="emp-grid" style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:12}}>
          {emps.map((e,i)=>(
            <div key={e.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:10}}>
                <Av name={e.nombre} size={34} color={COLORS[i%COLORS.length]}/>
                <div>
                  <div style={{fontSize:14,fontWeight:'bold'}}>{e.nombre}</div>
                  <div style={{fontSize:11,color:'var(--muted)'}}>{e.cargo}</div>
                </div>
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginBottom:10}}>{e.departamento} · {e.email}</div>
              <button onClick={()=>eliminar(e.id)} style={{background:'transparent',color:'var(--danger)',fontSize:11,border:'1px solid var(--danger)',padding:'4px 10px',borderRadius:4,width:'100%'}}>Eliminar</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── Empleado Fichar ───────────────────────────────────────────────
function EmpFichar({user,checkedIn,fichajeHoy,onAction,toast}){
  const [now,setNow]=useState(new Date());
  const [loading,setLoading]=useState(false);
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t)},[]);

  async function fichar(tipo){
    setLoading(true);
    if(tipo==='entrada'){
      if(checkedIn){toast('Ya tienes entrada activa','err');setLoading(false);return}
      const {error}=await sb.from('fichajes').insert({empleado_id:user.id,fecha:today(),entrada:new Date().toISOString()});
      if(error)toast('Error al fichar','err');else toast('Entrada registrada');
    } else {
      if(!fichajeHoy||!fichajeHoy.entrada||fichajeHoy.salida){toast('No hay entrada activa','err');setLoading(false);return}
      const {error}=await sb.from('fichajes').update({salida:new Date().toISOString()}).eq('id',fichajeHoy.id);
      if(error)toast('Error al fichar','err');else toast('Salida registrada');
    }
    setLoading(false);
    onAction();
  }

  return(
    <div>
      <SH title={`Hola, ${user.nombre.split(' ')[0]}`} sub={now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}/>
      <div style={{textAlign:'center',padding:'36px 0',marginBottom:22}}>
        <div style={{fontSize:50,letterSpacing:5,fontWeight:'bold',color:'var(--accent)',fontVariantNumeric:'tabular-nums',marginBottom:4}}>
          {now.toLocaleTimeString('es-ES')}
        </div>
        <div style={{fontSize:11,color:'var(--muted)',letterSpacing:2,textTransform:'uppercase',marginBottom:28}}>Hora actual</div>
        <div style={{display:'flex',gap:14,justifyContent:'center'}}>
          <button onClick={()=>fichar('entrada')} disabled={checkedIn||loading} style={{
            padding:'13px 36px',fontSize:13,letterSpacing:3,textTransform:'uppercase',fontWeight:'bold',
            background:checkedIn?'var(--surface2)':'var(--accent2)',
            color:checkedIn?'var(--muted)':'#0f0f0f',borderRadius:4,
            cursor:checkedIn?'not-allowed':'pointer'
          }}>↑ Entrada</button>
          <button onClick={()=>fichar('salida')} disabled={!checkedIn||loading} style={{
            padding:'13px 36px',fontSize:13,letterSpacing:3,textTransform:'uppercase',fontWeight:'bold',
            background:!checkedIn?'var(--surface2)':'var(--danger)',
            color:!checkedIn?'var(--muted)':'#fff',borderRadius:4,
            cursor:!checkedIn?'not-allowed':'pointer'
          }}>↓ Salida</button>
        </div>
        {fichajeHoy&&(
          <div style={{marginTop:18,fontSize:12,color:'var(--muted)'}}>
            Entrada: <span style={{color:'var(--accent2)'}}>{fmt(fichajeHoy.entrada)}</span>
            {fichajeHoy.salida&&<> · Salida: <span style={{color:'var(--danger)'}}>{fmt(fichajeHoy.salida)}</span> · Total: <span style={{color:'var(--accent)'}}>{fmtDur(new Date(fichajeHoy.salida)-new Date(fichajeHoy.entrada))}</span></>}
          </div>
        )}
      </div>
    </div>
  );
}

// ── Empleado Historial ────────────────────────────────────────────
function EmpHistorial({user}){
  const [rows,setRows]=useState([]);
  useEffect(()=>{
    sb.from('fichajes').select('*').eq('empleado_id',user.id).order('fecha',{ascending:false})
      .then(({data})=>setRows(data||[]));
  },[user.id]);

  const total=rows.filter(r=>r.salida).reduce((a,r)=>a+(new Date(r.salida)-new Date(r.entrada)),0);
  return(
    <div>
      <SH title='Mi historial' sub={`${rows.length} registros · ${fmtDur(total)} totales`}/>
      <Tabla cols={['Fecha','Entrada','Salida','Total','Estado']}>
        {rows.map(r=>{
          const dur=r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):null;
          return(
            <tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'9px 10px',fontSize:13}}>{fmtDate(r.fecha)}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--accent2)'}}>↑ {fmt(r.entrada)}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--danger)'}}>{r.salida?`↓ ${fmt(r.salida)}`:'-'}</td>
              <td style={{padding:'9px 10px',fontSize:12}}>{dur||'-'}</td>
              <td style={{padding:'9px 10px'}}><Badge label={r.salida?'Completo':'En curso'} c={r.salida?'var(--accent2)':'var(--accent)'}/></td>
            </tr>
          );
        })}
      </Tabla>
      {rows.length===0&&<Empty txt='Sin fichajes todavía'/>}
    </div>
  );
}

// ── Componentes reutilizables ─────────────────────────────────────
function SH({title,sub,children}){
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,paddingBottom:14,borderBottom:'1px solid var(--border)'}}>
      <div>
        <h2 style={{fontSize:18,fontWeight:'bold',letterSpacing:1,marginBottom:2,color:'var(--text)'}}>{title}</h2>
        {sub&&<div style={{fontSize:10,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>{sub}</div>}
      </div>
      {children}
    </div>
  );
}
function Av({name,size=32,color}){
  return(
    <div style={{width:size,height:size,borderRadius:'50%',background:color||'var(--surface3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.35,fontWeight:'bold',color:'var(--accent)',flexShrink:0}}>
      {ini(name)}
    </div>
  );
}
function Badge({label,c}){
  return <span style={{fontSize:10,padding:'3px 8px',borderRadius:10,background:`${c}22`,color:c,border:`1px solid ${c}44`,letterSpacing:1,textTransform:'uppercase',whiteSpace:'nowrap'}}>{label}</span>;
}
function Btn({label,onClick,ghost}){
  return(
    <button onClick={onClick} style={{
      background:ghost?'var(--surface2)':'var(--accent)',
      color:ghost?'var(--muted)':'#0f0f0f',
      padding:'7px 14px',fontSize:11,letterSpacing:1,textTransform:'uppercase',fontWeight:'bold',borderRadius:4,
      border:ghost?'1px solid var(--border)':'none'
    }}>{label}</button>
  );
}
function Tabla({cols,children}){
  return(
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse'}}>
        <thead>
          <tr style={{borderBottom:'1px solid var(--accent)'}}>
            {cols.map(c=><th key={c} style={{padding:'7px 10px',textAlign:'left',fontSize:10,letterSpacing:2,color:'var(--accent)',textTransform:'uppercase',fontWeight:'normal'}}>{c}</th>)}
          </tr>
        </thead>
        <tbody>{children}</tbody>
      </table>
    </div>
  );
}
function Empty({txt}){return <div style={{textAlign:'center',padding:'36px 0',color:'var(--muted)',fontSize:12,letterSpacing:2,textTransform:'uppercase'}}>{txt}</div>}
function Loading(){return <div style={{textAlign:'center',padding:'36px 0',color:'var(--muted)',fontSize:12,letterSpacing:2}}>Cargando...</div>}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
</body>
</html>
