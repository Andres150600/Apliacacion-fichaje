<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0f0f0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>WorkClock</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%}
body{font-family:'Courier New',monospace;transition:background .3s,color .3s}
body.dark{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#242424;--surface3:#2e2e2e;--text:#e8e4d9;--muted:#7a7670;--border:#333}
body.light{--bg:#f4f4f0;--surface:#ffffff;--surface2:#f0efe9;--surface3:#e8e7e0;--text:#1a1a1a;--muted:#888;--border:#ddd}
:root{--accent:#c8a96e;--accent2:#8fb8a0;--danger:#c0604a;--info:#5b8ec4;--r:4px;--r2:8px}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:var(--r);font-family:inherit;font-size:13px;width:100%;outline:none}
input:focus,select:focus{border-color:var(--accent)}
button{cursor:pointer;font-family:inherit;border-radius:var(--r);border:none;font-size:13px}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--border)}
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.bottom-nav-inner{display:flex;align-items:stretch;height:56px}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:9px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;padding:4px 2px;position:relative}
.bnav-item.active{color:var(--accent)}
.bnav-item.active::after{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:var(--accent);border-radius:0 0 2px 2px}
.bnav-icon{font-size:18px;line-height:1}
.nbadge{position:absolute;top:4px;right:calc(50% - 18px);background:var(--danger);color:#fff;border-radius:8px;font-size:9px;padding:1px 4px;font-weight:bold}
.mobile-top{display:none}
@media(max-width:768px){
  .bottom-nav{display:block}
  .desktop-sidebar{display:none!important}
  .main-pad{padding-bottom:70px!important;padding:16px 16px 70px!important}
  .stat-grid{grid-template-columns:repeat(2,1fr)!important}
  .week-dept-grid{grid-template-columns:1fr!important}
  .emp-grid{grid-template-columns:1fr!important}
  .mobile-1col{grid-template-columns:1fr!important}
  .mobile-top{display:flex!important}
  table{min-width:500px}
}
</style>
</head>
<body class="dark">
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback}=React;
const SUPABASE_URL='https://wcqjdnrcqgokcyyhvjhc.supabase.co';
const SUPABASE_KEY='sb_publishable_ArOQhPXl7zgWYiPnq80zwQ_BuRu3zL6';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
const fmt=d=>d?new Date(d).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}):'--';
const fmtDate=d=>d?new Date(d).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}):'--';
const fmtDur=ms=>{if(!ms||ms<0)return'0h 0m';return`${Math.floor(ms/3600000)}h ${Math.floor((ms%3600000)/60000)}m`};
const today=()=>new Date().toISOString().split('T')[0];
const ini=n=>n.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
const COLORS=['#c8a96e','#8fb8a0','#5b8ec4','#c0604a','#9b8ec4','#c48e5b'];

function App(){
  const [user,setUser]=useState(null);
  const [view,setView]=useState('login');
  const [toast,setToast]=useState(null);
  const [dark,setDark]=useState(true);
  useEffect(()=>{document.body.className=dark?'dark':'light'},[dark]);
  const showToast=(msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),3000)};
  const login=u=>{setUser(u);setView(u.es_admin?'admin':'emp')};
  const logout=()=>{setUser(null);setView('login')};
  return(
    <div style={{minHeight:'100%',background:'var(--bg)',color:'var(--text)'}}>
      {toast&&<div style={{position:'fixed',top:16,right:16,zIndex:9999,background:toast.type==='ok'?'var(--accent2)':'var(--danger)',color:'#fff',padding:'10px 18px',borderRadius:8,fontSize:13,fontWeight:'bold'}}>{toast.msg}</div>}
      {view==='login'&&<Login onLogin={login} toast={showToast} dark={dark} toggleDark={()=>setDark(d=>!d)}/>}
      {view==='admin'&&user&&<Admin user={user} onLogout={logout} toast={showToast} dark={dark} toggleDark={()=>setDark(d=>!d)}/>}
      {view==='emp'&&user&&<Empleado user={user} onLogout={logout} toast={showToast} dark={dark} toggleDark={()=>setDark(d=>!d)}/>}
    </div>
  );
}

function Login({onLogin,toast,dark,toggleDark}){
  const [emps,setEmps]=useState([]);
  const [sel,setSel]=useState('');
  const [pin,setPin]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  useEffect(()=>{sb.from('empleados').select('*').eq('activo',true).order('nombre').then(({data})=>setEmps(data||[]))},[]);
  async function acceder(){
    if(!sel){setErr('Selecciona un empleado');return}
    if(!pin){setErr('Introduce tu PIN');return}
    setLoading(true);setErr('');
    const emp=emps.find(e=>e.id===sel);
    if(!emp||emp.pin!==pin){setErr('PIN incorrecto');setPin('');setLoading(false);return}
    setLoading(false);onLogin(emp);
  }
  return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',padding:24}}>
      <div style={{width:'100%',maxWidth:400}}>
        <div style={{display:'flex',justifyContent:'flex-end',marginBottom:16}}>
          <button onClick={toggleDark} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'6px 12px',borderRadius:20,fontSize:12}}>{dark?'☀ Claro':'☾ Oscuro'}</button>
        </div>
        <div style={{textAlign:'center',marginBottom:40}}>
          <div style={{fontSize:11,letterSpacing:4,color:'var(--accent)',marginBottom:8,textTransform:'uppercase'}}>Sistema de fichaje</div>
          <h1 style={{fontSize:32,fontWeight:'normal',letterSpacing:3,color:'var(--text)'}}>WorkClock</h1>
          <div style={{width:40,height:1,background:'var(--accent)',margin:'12px auto 8px'}}/>
          <p style={{color:'var(--muted)',fontSize:12}}>Control de presencia empresarial</p>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:28}}>
          <div style={{marginBottom:14}}>
            <label style={{fontSize:11,letterSpacing:2,color:'var(--muted)',textTransform:'uppercase',display:'block',marginBottom:6}}>Empleado</label>
            <select value={sel} onChange={e=>setSel(e.target.value)}><option value=''>-- Seleccionar --</option>{emps.map(e=><option key={e.id} value={e.id}>{e.nombre}{e.es_admin?' (Admin)':''}</option>)}</select>
          </div>
          <div style={{marginBottom:20}}>
            <label style={{fontSize:11,letterSpacing:2,color:'var(--muted)',textTransform:'uppercase',display:'block',marginBottom:6}}>PIN</label>
            <input type='password' value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&acceder()} placeholder='••••' maxLength={6}/>
          </div>
          {err&&<div style={{color:'var(--danger)',fontSize:12,marginBottom:12}}>{err}</div>}
          <button onClick={acceder} disabled={loading} style={{width:'100%',padding:11,background:'var(--accent)',color:'#0f0f0f',fontWeight:'bold',letterSpacing:2,textTransform:'uppercase',fontSize:12,borderRadius:4}}>{loading?'Verificando...':'Acceder'}</button>
        </div>
      </div>
    </div>
  );
}

function TopBar({user,dark,toggleDark,onLogout,isAdmin,checkedIn}){
  return(
    <div className="mobile-top" style={{alignItems:'center',justifyContent:'space-between',marginBottom:16,paddingBottom:12,borderBottom:'1px solid var(--border)'}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <Av name={user.nombre} size={28}/>
        <div>
          <div style={{fontSize:13,fontWeight:'bold'}}>{user.nombre.split(' ')[0]}</div>
          {!isAdmin&&checkedIn!==undefined&&<span style={{fontSize:10,padding:'1px 6px',borderRadius:8,background:checkedIn?'rgba(143,184,160,0.2)':'rgba(128,128,128,0.1)',color:checkedIn?'var(--accent2)':'var(--muted)',border:`1px solid ${checkedIn?'var(--accent2)':'var(--border)'}`}}>{checkedIn?'En oficina':'Fuera'}</span>}
          {isAdmin&&<span style={{fontSize:10,color:'var(--accent)',letterSpacing:2}}>ADMIN</span>}
        </div>
      </div>
      <button onClick={toggleDark} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 10px',borderRadius:12,fontSize:11}}>{dark?'☀':'☾'}</button>
    </div>
  );
}

function Admin({user,onLogout,toast,dark,toggleDark}){
  const [tab,setTab]=useState('dashboard');
  const [pend,setPend]=useState(0);
  const [nAlertas,setNAlertas]=useState(0);
  useEffect(()=>{
    sb.from('ausencias').select('id',{count:'exact'}).eq('estado','pendiente').then(({count})=>setPend(count||0));
    const t=today();
    Promise.all([
      sb.from('fichajes').select('id',{count:'exact'}).is('salida',null).not('entrada','is',null).lt('fecha',t),
    ]).then(([a])=>setNAlertas(a.count||0));
  },[tab]);
  const tabs=[{id:'dashboard',icon:'▦',label:'Panel'},{id:'fichajes',icon:'◷',label:'Fichajes'},{id:'ausencias',icon:'◌',label:'Ausencias'},{id:'empleados',icon:'◉',label:'Equipo'},{id:'turnos',icon:'◑',label:'Turnos'},{id:'informes',icon:'▤',label:'Informes'},{id:'alertas',icon:'▲',label:'Alertas'}];
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <aside className="desktop-sidebar" style={{width:190,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'22px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div><div style={{fontSize:10,letterSpacing:3,color:'var(--accent)',marginBottom:3,textTransform:'uppercase'}}>Admin</div><div style={{fontSize:14,fontWeight:'bold'}}>{user.nombre.split(' ')[0]}</div><div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{user.departamento}</div></div>
          <button onClick={toggleDark} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 8px',borderRadius:12,fontSize:11}}>{dark?'☀':'☾'}</button>
        </div>
        <nav style={{flex:1,padding:'10px 0'}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 18px',background:tab===t.id?'var(--surface2)':'transparent',color:tab===t.id?'var(--accent)':'var(--muted)',textAlign:'left',fontSize:11,letterSpacing:2,textTransform:'uppercase',borderLeft:tab===t.id?'2px solid var(--accent)':'2px solid transparent',borderRight:'none',borderTop:'none',borderBottom:'none'}}>
              <span style={{fontSize:14}}>{t.icon}</span>{t.label}
              {t.id==='ausencias'&&pend>0&&<span style={{background:'var(--danger)',color:'#fff',borderRadius:10,fontSize:10,padding:'1px 6px',marginLeft:'auto'}}>{pend}</span>}
              {t.id==='alertas'&&nAlertas>0&&<span style={{background:'var(--danger)',color:'#fff',borderRadius:10,fontSize:10,padding:'1px 6px',marginLeft:'auto'}}>{nAlertas}</span>}
            </button>
          ))}
        </nav>
        <button onClick={onLogout} style={{padding:'13px 18px',background:'transparent',color:'var(--muted)',fontSize:11,letterSpacing:2,textTransform:'uppercase',textAlign:'left',borderTop:'1px solid var(--border)',borderLeft:'none',borderRight:'none',borderBottom:'none'}}>Cerrar sesión</button>
      </aside>
      <main className="main-pad" style={{flex:1,overflow:'auto',padding:26,background:'var(--bg)'}}>
        <TopBar user={user} dark={dark} toggleDark={toggleDark} onLogout={onLogout} isAdmin={true}/>
        {tab==='dashboard'&&<AdminDashboard/>}
        {tab==='fichajes'&&<AdminFichajes toast={toast}/>}
        {tab==='ausencias'&&<AdminAusencias toast={toast}/>}
        {tab==='empleados'&&<AdminEmpleados toast={toast}/>}
        {tab==='turnos'&&<AdminTurnos toast={toast}/>}
        {tab==='informes'&&<AdminInformes toast={toast}/>}
        {tab==='alertas'&&<AdminAlertas/>}
      </main>
      <nav className="bottom-nav"><div className="bottom-nav-inner">
        {tabs.map(t=>(<button key={t.id} className={`bnav-item${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}>{t.id==='ausencias'&&pend>0&&<span className="nbadge">{pend}</span>}{t.id==='alertas'&&nAlertas>0&&<span className="nbadge">{nAlertas}</span>}<span className="bnav-icon">{t.icon}</span><span>{t.label}</span></button>))}
        <button className="bnav-item" onClick={onLogout}><span className="bnav-icon">⏏</span><span>Salir</span></button>
      </div></nav>
    </div>
  );
}

function Empleado({user,onLogout,toast,dark,toggleDark}){
  const [tab,setTab]=useState('fichar');
  const [checkedIn,setCheckedIn]=useState(false);
  const [fichajeHoy,setFichajeHoy]=useState(null);
  const checkStatus=useCallback(()=>{
    sb.from('fichajes').select('*').eq('empleado_id',user.id).eq('fecha',today()).maybeSingle()
      .then(({data})=>{setFichajeHoy(data);setCheckedIn(!!(data&&data.entrada&&!data.salida))});
  },[user.id]);
  useEffect(checkStatus,[checkStatus]);
  const tabs=[{id:'fichar',icon:'◷',label:'Fichar'},{id:'historial',icon:'▤',label:'Historial'},{id:'ausencias',icon:'◌',label:'Ausencias'},{id:'calendario',icon:'▦',label:'Equipo'},{id:'documentos',icon:'▣',label:'Docs'}];
  const props={user,toast,dark,toggleDark,onLogout,checkedIn,fichajeHoy,onAction:checkStatus};
  return(
    <div style={{display:'flex',minHeight:'100vh'}}>
      <aside className="desktop-sidebar" style={{width:190,background:'var(--surface)',borderRight:'1px solid var(--border)',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'22px 18px',borderBottom:'1px solid var(--border)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div>
            <div style={{fontSize:10,letterSpacing:3,color:'var(--accent)',marginBottom:3,textTransform:'uppercase'}}>Empleado</div>
            <div style={{fontSize:14,fontWeight:'bold'}}>{user.nombre.split(' ')[0]}</div>
            <div style={{marginTop:6}}><span style={{fontSize:10,padding:'3px 8px',borderRadius:10,letterSpacing:1,textTransform:'uppercase',background:checkedIn?'rgba(143,184,160,0.2)':'rgba(128,128,128,0.1)',color:checkedIn?'var(--accent2)':'var(--muted)',border:`1px solid ${checkedIn?'var(--accent2)':'var(--border)'}`}}>{checkedIn?'En oficina':'Fuera'}</span></div>
          </div>
          <button onClick={toggleDark} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 8px',borderRadius:12,fontSize:11}}>{dark?'☀':'☾'}</button>
        </div>
        <nav style={{flex:1,padding:'10px 0'}}>
          {tabs.map(t=>(<button key={t.id} onClick={()=>setTab(t.id)} style={{display:'flex',alignItems:'center',gap:8,width:'100%',padding:'10px 18px',background:tab===t.id?'var(--surface2)':'transparent',color:tab===t.id?'var(--accent)':'var(--muted)',textAlign:'left',fontSize:11,letterSpacing:2,textTransform:'uppercase',borderLeft:tab===t.id?'2px solid var(--accent)':'2px solid transparent',borderRight:'none',borderTop:'none',borderBottom:'none'}}><span style={{fontSize:14}}>{t.icon}</span>{t.label}</button>))}
        </nav>
        <button onClick={onLogout} style={{padding:'13px 18px',background:'transparent',color:'var(--muted)',fontSize:11,letterSpacing:2,textTransform:'uppercase',textAlign:'left',borderTop:'1px solid var(--border)',borderLeft:'none',borderRight:'none',borderBottom:'none'}}>Cerrar sesión</button>
      </aside>
      <main className="main-pad" style={{flex:1,overflow:'auto',padding:26,background:'var(--bg)'}}>
        <TopBar user={user} dark={dark} toggleDark={toggleDark} onLogout={onLogout} checkedIn={checkedIn}/>
        {tab==='fichar'&&<EmpFichar {...props}/>}
        {tab==='historial'&&<EmpHistorial {...props}/>}
        {tab==='ausencias'&&<EmpAusencias {...props}/>}
        {tab==='calendario'&&<Calendario {...props}/>}
        {tab==='documentos'&&<EmpDocumentos {...props}/>}
      </main>
      <nav className="bottom-nav"><div className="bottom-nav-inner">
        {tabs.map(t=>(<button key={t.id} className={`bnav-item${tab===t.id?' active':''}`} onClick={()=>setTab(t.id)}><span className="bnav-icon">{t.icon}</span><span>{t.label}</span></button>))}
        <button className="bnav-item" onClick={onLogout}><span className="bnav-icon">⏏</span><span>Salir</span></button>
      </div></nav>
    </div>
  );
}

function AdminDashboard(){
  const [stats,setStats]=useState({e:0,f:0,o:0,p:0});
  const [sem,setSem]=useState([]);
  const [dep,setDep]=useState([]);
  const [rec,setRec]=useState([]);
  useEffect(()=>{
    const t=today();
    const getLunes=()=>{const d=new Date();const dow=d.getDay()||7;d.setDate(d.getDate()-dow+1);return d.toISOString().split('T')[0]};
    Promise.all([
      sb.from('empleados').select('id,departamento',{count:'exact'}).eq('es_admin',false).eq('activo',true),
      sb.from('fichajes').select('id,entrada,salida').eq('fecha',t),
      sb.from('ausencias').select('id',{count:'exact'}).eq('estado','pendiente'),
      sb.from('fichajes').select('fecha').gte('fecha',getLunes()),
      sb.from('fichajes').select('id,empleado_id,fecha,entrada,salida,empleados(nombre)').order('created_at',{ascending:false}).limit(6),
    ]).then(([e,f,p,s,r])=>{
      setStats({e:e.count||0,f:(f.data||[]).filter(x=>x.entrada).length,o:(f.data||[]).filter(x=>x.entrada&&!x.salida).length,p:p.count||0});
      const dias=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
      const map={};(s.data||[]).forEach(x=>{map[x.fecha]=(map[x.fecha]||0)+1});
      setSem(dias.map((d,i)=>{const dt=new Date();const dow=dt.getDay()||7;dt.setDate(dt.getDate()-dow+i+1);return{d,n:map[dt.toISOString().split('T')[0]]||0}}));
      const dm={};(e.data||[]).forEach(x=>{dm[x.departamento]=(dm[x.departamento]||0)+1});
      setDep(Object.entries(dm));setRec(r.data||[]);
    });
  },[]);
  const mx=Math.max(...sem.map(s=>s.n),1);
  return(
    <div>
      <SH title='Panel de control' sub={fmtDate(new Date())}/>
      <div className="stat-grid" style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:22}}>
        {[{l:'Empleados',v:stats.e},{l:'Fichajes hoy',v:stats.f},{l:'En oficina',v:stats.o,hi:true},{l:'Pendientes',v:stats.p,warn:stats.p>0}].map((s,i)=>(
          <div key={i} style={{background:'var(--surface)',border:`1px solid ${s.hi?'var(--accent2)':s.warn?'var(--danger)':'var(--border)'}`,borderRadius:8,padding:16}}>
            <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:8,textTransform:'uppercase'}}>{s.l}</div>
            <div style={{fontSize:28,color:s.hi?'var(--accent2)':s.warn?'var(--danger)':'var(--text)'}}>{s.v}</div>
          </div>
        ))}
      </div>
      <div className="week-dept-grid" style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:14,marginBottom:22}}>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:14,textTransform:'uppercase'}}>Esta semana</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:72}}>
            {sem.map((s,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
                <div style={{width:'100%',background:s.n>0?'var(--accent)':'var(--surface2)',height:`${(s.n/mx)*60+4}px`,minHeight:4,borderRadius:2}}/>
                <span style={{fontSize:10,color:'var(--muted)'}}>{s.d}</span>
                {s.n>0&&<span style={{fontSize:10,color:'var(--accent)'}}>{s.n}</span>}
              </div>
            ))}
          </div>
        </div>
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:14,textTransform:'uppercase'}}>Departamentos</div>
          {dep.map(([d,n],i)=>(
            <div key={d} style={{marginBottom:10}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>{d}</span><span style={{color:'var(--accent)'}}>{n}</span></div>
              <div style={{height:3,background:'var(--surface2)',borderRadius:2}}><div style={{height:'100%',background:COLORS[i%COLORS.length],width:`${(n/Math.max(...dep.map(x=>x[1]),1))*100}%`,borderRadius:2}}/></div>
            </div>
          ))}
        </div>
      </div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:18}}>

function AdminFichajes({toast}){
  const [rows,setRows]=useState([]);
  const [emps,setEmps]=useState([]);
  const [fE,setFE]=useState('');
  const [fF,setFF]=useState('');
  const [loading,setLoading]=useState(true);
  useEffect(()=>{sb.from('empleados').select('id,nombre').eq('es_admin',false).order('nombre').then(({data})=>setEmps(data||[]))},[]);
  useEffect(()=>{
    setLoading(true);
    let q=sb.from('fichajes').select('*,empleados(nombre)').order('created_at',{ascending:false});
    if(fE)q=q.eq('empleado_id',fE);if(fF)q=q.eq('fecha',fF);
    q.then(({data})=>{setRows(data||[]);setLoading(false)});
  },[fE,fF]);
  function exportExcel(){
    const data=[['Empleado','Fecha','Entrada','Salida','Total','Estado']];
    rows.forEach(r=>{data.push([r.empleados?.nombre||'-',r.fecha,fmt(r.entrada),r.salida?fmt(r.salida):'-',r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):'En curso',r.salida?'Completo':'En curso'])});
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=[{wch:22},{wch:12},{wch:10},{wch:10},{wch:12},{wch:12}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Fichajes');
    XLSX.writeFile(wb,`fichajes_${today()}.xlsx`);
    toast('Excel descargado');
  }
  return(
    <div>
      <SH title='Registro de fichajes' sub={`${rows.length} registros`}><Btn label='↓ Excel' onClick={exportExcel}/></SH>
      <div style={{display:'flex',gap:10,marginBottom:14,flexWrap:'wrap'}}>
        <select value={fE} onChange={e=>setFE(e.target.value)} style={{width:200}}><option value=''>Todos</option>{emps.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select>

      </div>
      {loading?<Loading/>:(
        <Tabla cols={['Empleado','Fecha','Entrada','Salida','Total','Estado']}>
          {rows.map(r=>{
            const dur=r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):null;
            return(<tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
              <td style={{padding:'9px 10px'}}><div style={{display:'flex',alignItems:'center',gap:8}}><Av name={r.empleados?.nombre||'?'} size={22}/><span style={{fontSize:13}}>{r.empleados?.nombre}</span></div></td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(r.fecha)}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--accent2)'}}>↑{fmt(r.entrada)}</td>
              <td style={{padding:'9px 10px',fontSize:12,color:'var(--danger)'}}>{r.salida?`↓${fmt(r.salida)}`:'-'}</td>
              <td style={{padding:'9px 10px',fontSize:12}}>{dur||'-'}</td>
              <td style={{padding:'9px 10px'}}><Badge label={r.salida?'Completo':'En curso'} c={r.salida?'var(--accent2)':'var(--accent)'}/></td>
            </tr>);
          })}
        </Tabla>
      )}
      {!loading&&rows.length===0&&<Empty txt='No hay fichajes'/>}
    </div>
  );
}

function AdminTurnos({toast}){
  const [turnos,setTurnos]=useState([]);
  const [emps,setEmps]=useState([]);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({nombre:'',hora_entrada:'08:00',hora_salida:'17:00',empleado_id:'',dias_semana:[1,2,3,4,5]});
  const DIAS=[{n:'L',v:1},{n:'M',v:2},{n:'X',v:3},{n:'J',v:4},{n:'V',v:5},{n:'S',v:6},{n:'D',v:0}];
  const load=useCallback(()=>{
    Promise.all([
      sb.from('turnos').select('*,empleados(nombre)').eq('activo',true).order('created_at',{ascending:false}),
      sb.from('empleados').select('id,nombre').eq('es_admin',false).eq('activo',true).order('nombre')
    ]).then(([t,e])=>{setTurnos(t.data||[]);setEmps(e.data||[])});
  },[]);
  useEffect(load,[load]);
  async function guardar(){
    if(!form.nombre||!form.empleado_id){toast('Nombre y empleado obligatorios','err');return}
    const {error}=await sb.from('turnos').insert({...form,activo:true});
    if(error)toast('Error: '+error.message,'err');
    else{toast('Turno creado');setForm({nombre:'',hora_entrada:'08:00',hora_salida:'17:00',empleado_id:'',dias_semana:[1,2,3,4,5]});setShow(false);load();}
  }
  async function eliminar(id){
    if(!confirm('¿Eliminar turno?'))return;
    await sb.from('turnos').update({activo:false}).eq('id',id);toast('Eliminado');load();
  }
  const toggleDia=v=>setForm(f=>({...f,dias_semana:f.dias_semana.includes(v)?f.dias_semana.filter(d=>d!==v):[...f.dias_semana,v].sort((a,b)=>a-b)}));
  const nomDias=d=>{const ns=DIAS.filter(x=>(d||[]).includes(x.v)).map(x=>x.n);return ns.length?ns.join(' '):'—'};
  const durTurno=(e,s)=>{const[eh,em]=e.split(':').map(Number);const[sh,sm]=s.split(':').map(Number);const diff=(sh*60+sm)-(eh*60+em);return diff>0?`${Math.floor(diff/60)}h ${diff%60}m`:'—'};
  return(
    <div>
      <SH title='Gestión de turnos' sub={`${turnos.length} turnos activos`}><Btn label='+ Nuevo turno' onClick={()=>setShow(!show)}/></SH>
      {show&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:8,padding:18,marginBottom:18}}>
          <div className="mobile-1col" style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}>
            <input placeholder='Nombre del turno (ej: Mañana, Tarde...)' value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}/>
            <select value={form.empleado_id} onChange={e=>setForm(f=>({...f,empleado_id:e.target.value}))}><option value=''>-- Asignar empleado --</option>{emps.map(e=><option key={e.id} value={e.id}>{e.nombre}</option>)}</select>
            <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4,letterSpacing:1}}>HORA ENTRADA</label><input type='time' value={form.hora_entrada} onChange={e=>setForm(f=>({...f,hora_entrada:e.target.value}))}/></div>
            <div><label style={{fontSize:11,color:'var(--muted)',display:'block',marginBottom:4,letterSpacing:1}}>HORA SALIDA</label><input type='time' value={form.hora_salida} onChange={e=>setForm(f=>({...f,hora_salida:e.target.value}))}/></div>
          </div>
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,color:'var(--muted)',marginBottom:8,letterSpacing:1,textTransform:'uppercase'}}>Días de la semana</div>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {DIAS.map(d=>(
                <button key={d.v} onClick={()=>toggleDia(d.v)} style={{width:36,height:36,borderRadius:'50%',background:form.dias_semana.includes(d.v)?'var(--accent)':'var(--surface2)',color:form.dias_semana.includes(d.v)?'#0f0f0f':'var(--muted)',border:`1px solid ${form.dias_semana.includes(d.v)?'var(--accent)':'var(--border)'}`,fontWeight:'bold',fontSize:12,transition:'all .15s'}}>{d.n}</button>
              ))}
            </div>
          </div>
          <div style={{display:'flex',gap:8}}><Btn label='Guardar turno' onClick={guardar}/><Btn label='Cancelar' ghost onClick={()=>setShow(false)}/></div>
        </div>
      )}
      {turnos.length===0&&!show?<Empty txt='No hay turnos definidos'/>:(
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(250px,1fr))',gap:12}}>
          {turnos.map(t=>(
            <div key={t.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10,gap:8}}>
                <div style={{fontSize:14,fontWeight:'bold'}}>{t.nombre}</div>
                <span style={{fontSize:11,padding:'3px 8px',borderRadius:8,background:'rgba(200,169,110,0.15)',color:'var(--accent)',whiteSpace:'nowrap'}}>{t.hora_entrada?.slice(0,5)} — {t.hora_salida?.slice(0,5)}</span>
              </div>
              {t.empleados&&<div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8}}><Av name={t.empleados.nombre} size={24}/><span style={{fontSize:13}}>{t.empleados.nombre}</span></div>}
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'var(--muted)',marginBottom:10}}>
                <span>Días: {nomDias(t.dias_semana)}</span>
                <span>{durTurno(t.hora_entrada,t.hora_salida)}/día</span>
              </div>
              <button onClick={()=>eliminar(t.id)} style={{background:'transparent',color:'var(--danger)',fontSize:11,border:'1px solid var(--danger)',padding:'4px 10px',borderRadius:4,width:'100%'}}>Eliminar</button>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminInformes({toast}){
  const now=new Date();
  const [mes,setMes]=useState(now.getMonth());
  const [anio,setAnio]=useState(now.getFullYear());
  const [loading,setLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  async function generar(){
    setLoading(true);setPreview(null);
    const desde=`${anio}-${String(mes+1).padStart(2,'0')}-01`;
    const hasta=`${anio}-${String(mes+1).padStart(2,'0')}-${new Date(anio,mes+1,0).getDate()}`;
    const [{data:emps},{data:fichs},{data:aus}]=await Promise.all([
      sb.from('empleados').select('*').eq('es_admin',false).eq('activo',true).order('nombre'),
      sb.from('fichajes').select('*').gte('fecha',desde).lte('fecha',hasta),
      sb.from('ausencias').select('*').gte('desde',desde).lte('hasta',hasta),
    ]);
    const filas=(emps||[]).map(emp=>{
      const mf=(fichs||[]).filter(f=>f.empleado_id===emp.id);
      const ma=(aus||[]).filter(a=>a.empleado_id===emp.id);
      const ms=mf.filter(f=>f.salida).reduce((a,f)=>a+(new Date(f.salida)-new Date(f.entrada)),0);
      return{nombre:emp.nombre,dept:emp.departamento,dias:mf.filter(f=>f.entrada).length,horas:fmtDur(ms),ausAp:ma.filter(a=>a.estado==='aprobada').length,ausPe:ma.filter(a=>a.estado==='pendiente').length,fichajes:mf};
    });
    setPreview({filas,mes:meses[mes],anio});setLoading(false);
  }
  function exportar(det){
    if(!preview)return;
    let data,name,sheetName;
    if(!det){
      data=[['Empleado','Departamento','Días trabajados','Horas totales','Ausencias aprobadas','Ausencias pendientes'],...preview.filas.map(f=>[f.nombre,f.dept,f.dias,f.horas,f.ausAp,f.ausPe])];
      name=`resumen_${preview.mes}_${preview.anio}.xlsx`;sheetName='Resumen';
    } else {
      const r=[];preview.filas.forEach(f=>f.fichajes.forEach(fi=>r.push([f.nombre,f.dept,fi.fecha,fmt(fi.entrada),fi.salida?fmt(fi.salida):'-',fi.salida?fmtDur(new Date(fi.salida)-new Date(fi.entrada)):'-'])));
      data=[['Empleado','Departamento','Fecha','Entrada','Salida','Total'],...r];
      name=`detallado_${preview.mes}_${preview.anio}.xlsx`;sheetName='Detallado';
    }
    const ws=XLSX.utils.aoa_to_sheet(data);
    ws['!cols']=det?[{wch:22},{wch:14},{wch:12},{wch:10},{wch:10},{wch:12}]:[{wch:22},{wch:14},{wch:14},{wch:14},{wch:18},{wch:18}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,sheetName);
    XLSX.writeFile(wb,name);
    toast('Excel descargado');
  }
  return(
    <div>
      <SH title='Informes mensuales'/>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:20,marginBottom:20}}>
        <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
          <select value={mes} onChange={e=>setMes(Number(e.target.value))} style={{width:160}}>{meses.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
          <select value={anio} onChange={e=>setAnio(Number(e.target.value))} style={{width:100}}>{[2024,2025,2026,2027].map(a=><option key={a} value={a}>{a}</option>)}</select>
          <Btn label={loading?'Generando...':'Generar'} onClick={generar}/>
        </div>
      </div>
      {preview&&(
        <>
          <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap'}}>
            <button onClick={()=>exportar(false)} style={{background:'var(--accent2)',color:'#0f0f0f',padding:'8px 16px',fontSize:11,fontWeight:'bold',borderRadius:4,border:'none',letterSpacing:1,textTransform:'uppercase'}}>↓ Resumen Excel</button>
            <button onClick={()=>exportar(true)} style={{background:'var(--info)',color:'#fff',padding:'8px 16px',fontSize:11,fontWeight:'bold',borderRadius:4,border:'none',letterSpacing:1,textTransform:'uppercase'}}>↓ Detallado Excel</button>
          </div>
          <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:20}}>
            <div style={{fontSize:10,letterSpacing:2,color:'var(--accent)',marginBottom:14,textTransform:'uppercase'}}>{preview.mes} {preview.anio}</div>
            <Tabla cols={['Empleado','Dpto','Días','Horas','Aus.Ap','Aus.Pe']}>
              {preview.filas.map((f,i)=>(<tr key={i} style={{borderBottom:'1px solid var(--border)'}}>
                <td style={{padding:'9px 10px',fontSize:13,fontWeight:'bold'}}>{f.nombre}</td>
                <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{f.dept}</td>
                <td style={{padding:'9px 10px',fontSize:13,color:'var(--accent)'}}>{f.dias}</td>
                <td style={{padding:'9px 10px',fontSize:12}}>{f.horas}</td>
                <td style={{padding:'9px 10px'}}>{f.ausAp>0?<Badge label={f.ausAp} c='var(--accent2)'/>:<span style={{color:'var(--muted)',fontSize:12}}>0</span>}</td>
                <td style={{padding:'9px 10px'}}>{f.ausPe>0?<Badge label={f.ausPe} c='var(--danger)'/>:<span style={{color:'var(--muted)',fontSize:12}}>0</span>}</td>
              </tr>))}
            </Tabla>
          </div>
        </>
      )}
      {!preview&&!loading&&<Empty txt='Selecciona mes y genera el informe'/>}
    </div>
  );
}

      sb.from('fichajes').select('*,empleados(nombre,departamento)').is('salida',null).not('entrada','is',null).lt('fecha',t),
      sb.from('fichajes').select('*,empleados(nombre)').not('salida','is',null).gte('fecha',hace30),
      dow>=1&&dow<=5?sb.from('empleados').select('id,nombre,departamento').eq('es_admin',false).eq('activo',true):Promise.resolve({data:[]}),
      dow>=1&&dow<=5?sb.from('fichajes').select('empleado_id').eq('fecha',t):Promise.resolve({data:[]}),
    ]).then(([abiertos,recientes,emps,fichadosHoy])=>{
      const als=[];
      (abiertos.data||[]).forEach(f=>{
        als.push({tipo:'sin_salida',nivel:'danger',titulo:'Fichaje sin salida',msg:`${f.empleados?.nombre} — sin registrar salida el ${fmtDate(f.fecha)}`,emp:f.empleados?.nombre});
      });
      (recientes.data||[]).forEach(f=>{
        const dur=new Date(f.salida)-new Date(f.entrada);
        if(dur>10*3600000){
          als.push({tipo:'jornada_larga',nivel:'warn',titulo:'Jornada excesiva',msg:`${f.empleados?.nombre} — ${fmtDur(dur)} trabajadas el ${fmtDate(f.fecha)}`,emp:f.empleados?.nombre});
        }
      });
      if(dow>=1&&dow<=5){
        const ids=new Set((fichadosHoy.data||[]).map(f=>f.empleado_id));
        (emps.data||[]).forEach(e=>{
          if(!ids.has(e.id)){
            als.push({tipo:'no_fichado',nivel:'info',titulo:'Sin fichaje hoy',msg:`${e.nombre}${e.departamento?' ('+e.departamento+')':''} — no ha registrado entrada hoy`,emp:e.nombre});
          }
        });
      }
      setAlertas(als);setLoading(false);
    });
  },[]);
  const icon={sin_salida:'⚠',jornada_larga:'⏱',no_fichado:'◎'};
  const col={danger:'var(--danger)',warn:'var(--accent)',info:'var(--info)'};
  const label={danger:'Urgente',warn:'Aviso',info:'Pendiente'};
  const grupos={sin_salida:alertas.filter(a=>a.tipo==='sin_salida'),jornada_larga:alertas.filter(a=>a.tipo==='jornada_larga'),no_fichado:alertas.filter(a=>a.tipo==='no_fichado')};
  const titulosGrupo={sin_salida:'Fichajes sin salida',jornada_larga:'Jornadas excesivas (>10h)',no_fichado:'Sin fichar hoy'};
  return(
    <div>
      <SH title='Alertas' sub={loading?'Comprobando...':alertas.length===0?'Sin incidencias':`${alertas.length} avisos activos`}/>
      {loading?<Loading/>:alertas.length===0?(
        <div style={{background:'var(--surface)',border:'1px solid var(--accent2)',borderRadius:8,padding:28,textAlign:'center'}}>
          <div style={{fontSize:28,marginBottom:10}}>✓</div>
          <div style={{fontSize:13,color:'var(--accent2)',fontWeight:'bold',marginBottom:4}}>Todo en orden</div>
          <div style={{fontSize:11,color:'var(--muted)'}}>No hay alertas pendientes</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:20}}>
          {Object.entries(grupos).filter(([,arr])=>arr.length>0).map(([tipo,arr])=>(
            <div key={tipo}>
              <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:10,textTransform:'uppercase',display:'flex',alignItems:'center',gap:8}}>
                <span>{titulosGrupo[tipo]}</span>
                <span style={{background:col[arr[0].nivel],color:'#fff',borderRadius:10,padding:'1px 7px',fontSize:10}}>{arr.length}</span>
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {arr.map((a,i)=>(
                  <div key={i} style={{background:'var(--surface)',border:`1px solid ${col[a.nivel]}33`,borderLeft:`3px solid ${col[a.nivel]}`,borderRadius:8,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:20,color:col[a.nivel],flexShrink:0}}>{icon[a.tipo]}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,marginBottom:2}}>{a.msg}</div>
                    </div>
                    <Badge label={label[a.nivel]} c={col[a.nivel]}/>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function EmpFichar({user,checkedIn,fichajeHoy,onAction,toast}){
  const [now,setNow]=useState(new Date());
  const [loading,setLoading]=useState(false);
  const [vac,setVac]=useState(null);
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),1000);return()=>clearInterval(t)},[]);
  useEffect(()=>{sb.from('empleados').select('dias_vacaciones,dias_usados').eq('id',user.id).single().then(({data})=>{if(data)setVac(data)})},[user.id]);
  async function getGeo(){
    return new Promise(res=>{
      if(!navigator.geolocation)return res({});
      const t=setTimeout(()=>res({}),5000);
      navigator.geolocation.getCurrentPosition(
        p=>{clearTimeout(t);res({lat_entrada:p.coords.latitude,lng_entrada:p.coords.longitude})},
        ()=>{clearTimeout(t);res({})},
        {timeout:4000,maximumAge:60000}
      );
    });
  }
  async function fichar(tipo){
    setLoading(true);
    try{
      if(tipo==='entrada'){
        if(checkedIn){toast('Ya tienes entrada activa','err');return}
        const pos=await getGeo();
        const datos={empleado_id:user.id,fecha:today(),entrada:new Date().toISOString()};
        if(pos.lat_entrada!=null){datos.lat_entrada=pos.lat_entrada;datos.lng_entrada=pos.lng_entrada;}
        const {error}=await sb.from('fichajes').insert(datos);
        if(error&&error.message.includes('column')){
          const {error:e2}=await sb.from('fichajes').insert({empleado_id:user.id,fecha:today(),entrada:new Date().toISOString()});
          if(e2)throw e2;
        }else if(error)throw error;
        toast('Entrada registrada');
      } else {
        if(!fichajeHoy?.entrada||fichajeHoy?.salida){toast('No hay entrada activa','err');return}
        const pos=await getGeo();
        const datos={salida:new Date().toISOString()};
        if(pos.lat_entrada!=null){datos.lat_salida=pos.lat_entrada;datos.lng_salida=pos.lng_entrada;}
        const {error}=await sb.from('fichajes').update(datos).eq('id',fichajeHoy.id);
        if(error&&error.message.includes('column')){
          const {error:e2}=await sb.from('fichajes').update({salida:new Date().toISOString()}).eq('id',fichajeHoy.id);
          if(e2)throw e2;
        }else if(error)throw error;
        toast('Salida registrada');
      }
      onAction();
    }catch(e){
      toast('Error al fichar: '+(e?.message||'inténtalo de nuevo'),'err');
    }finally{
      setLoading(false);
    }
  }
  const rest=vac?(vac.dias_vacaciones||22)-(vac.dias_usados||0):null;
  return(
    <div>
      <SH title={`Hola, ${user.nombre.split(' ')[0]}`} sub={now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'})}/>
      <div style={{textAlign:'center',padding:'32px 0',marginBottom:22}}>
        <div style={{fontSize:50,letterSpacing:5,fontWeight:'bold',color:'var(--accent)',fontVariantNumeric:'tabular-nums',marginBottom:4}}>{now.toLocaleTimeString('es-ES')}</div>
        <div style={{fontSize:11,color:'var(--muted)',letterSpacing:2,textTransform:'uppercase',marginBottom:28}}>Hora actual</div>
        <div style={{display:'flex',gap:14,justifyContent:'center',flexWrap:'wrap'}}>
          <button onClick={()=>fichar('entrada')} disabled={checkedIn||loading} style={{padding:'14px 36px',fontSize:13,letterSpacing:3,textTransform:'uppercase',fontWeight:'bold',background:checkedIn?'var(--surface2)':'var(--accent2)',color:checkedIn?'var(--muted)':'#0f0f0f',borderRadius:4,cursor:checkedIn?'not-allowed':'pointer'}}>↑ Entrada</button>
          <button onClick={()=>fichar('salida')} disabled={!checkedIn||loading} style={{padding:'14px 36px',fontSize:13,letterSpacing:3,textTransform:'uppercase',fontWeight:'bold',background:!checkedIn?'var(--surface2)':'var(--danger)',color:!checkedIn?'var(--muted)':'#fff',borderRadius:4,cursor:!checkedIn?'not-allowed':'pointer'}}>↓ Salida</button>
        </div>
        {fichajeHoy&&<div style={{marginTop:18,fontSize:12,color:'var(--muted)'}}>Entrada: <span style={{color:'var(--accent2)'}}>{fmt(fichajeHoy.entrada)}</span>{fichajeHoy.salida&&<> · Salida: <span style={{color:'var(--danger)'}}>{fmt(fichajeHoy.salida)}</span> · Total: <span style={{color:'var(--accent)'}}>{fmtDur(new Date(fichajeHoy.salida)-new Date(fichajeHoy.entrada))}</span></>}</div>}
      </div>
      {vac&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:12,textTransform:'uppercase'}}>Mis vacaciones</div>
          <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
            <span style={{fontSize:13}}>{vac.dias_usados||0} días usados</span>
            <span style={{fontSize:13,color:'var(--accent2)',fontWeight:'bold'}}>{rest} disponibles</span>
          </div>
          <div style={{height:6,background:'var(--surface2)',borderRadius:3}}>
            <div style={{height:'100%',background:'var(--accent2)',width:`${Math.min(((vac.dias_usados||0)/(vac.dias_vacaciones||22))*100,100)}%`,borderRadius:3,transition:'width .3s'}}/>
          </div>
          <div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>{vac.dias_vacaciones||22} días totales</div>
        </div>
      )}
    </div>
  );
}

function EmpHistorial({user}){
  const [rows,setRows]=useState([]);
  useEffect(()=>{sb.from('fichajes').select('*').eq('empleado_id',user.id).order('fecha',{ascending:false}).then(({data})=>setRows(data||[]))},[user.id]);
  const total=rows.filter(r=>r.salida).reduce((a,r)=>a+(new Date(r.salida)-new Date(r.entrada)),0);
  return(
    <div>
      <SH title='Mi historial' sub={`${rows.length} registros · ${fmtDur(total)} totales`}/>
      <Tabla cols={['Fecha','Entrada','Salida','Total','Estado']}>
        {rows.map(r=>{const dur=r.salida?fmtDur(new Date(r.salida)-new Date(r.entrada)):null;return(<tr key={r.id} style={{borderBottom:'1px solid var(--border)'}}>
          <td style={{padding:'9px 10px',fontSize:13}}>{fmtDate(r.fecha)}</td>
          <td style={{padding:'9px 10px',fontSize:12,color:'var(--accent2)'}}>↑{fmt(r.entrada)}</td>
          <td style={{padding:'9px 10px',fontSize:12,color:'var(--danger)'}}>{r.salida?`↓${fmt(r.salida)}`:'-'}</td>
          <td style={{padding:'9px 10px',fontSize:12}}>{dur||'-'}</td>
          <td style={{padding:'9px 10px'}}><Badge label={r.salida?'Completo':'En curso'} c={r.salida?'var(--accent2)':'var(--accent)'}/></td>
        </tr>)})}
      </Tabla>
      {rows.length===0&&<Empty txt='Sin fichajes todavía'/>}
    </div>
  );
}

function EmpAusencias({user,toast}){
  const [rows,setRows]=useState([]);
  const [show,setShow]=useState(false);
  const [form,setForm]=useState({tipo:'Vacaciones',desde:today(),hasta:today(),motivo:''});
  const load=useCallback(()=>{sb.from('ausencias').select('*').eq('empleado_id',user.id).order('created_at',{ascending:false}).then(({data})=>setRows(data||[]))},[user.id]);
  useEffect(load,[load]);
  async function enviar(){
    if(!form.motivo){toast('Indica el motivo','err');return}
    await sb.from('ausencias').insert({...form,empleado_id:user.id,estado:'pendiente'});
    toast('Solicitud enviada');setShow(false);load();
  }
  return(
    <div>
      <SH title='Mis ausencias' sub={`${rows.length} solicitudes`}><Btn label='+ Solicitar' onClick={()=>setShow(!show)}/></SH>
      {show&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--accent)',borderRadius:8,padding:18,marginBottom:18}}>
          <div className="mobile-1col" style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:10}}>
            <select value={form.tipo} onChange={e=>setForm(f=>({...f,tipo:e.target.value}))}>{['Vacaciones','Enfermedad','Personal','Maternidad/Paternidad','Otro'].map(t=><option key={t}>{t}</option>)}</select>
            <input type='date' value={form.desde} onChange={e=>setForm(f=>({...f,desde:e.target.value}))}/>
            <input type='date' value={form.hasta} onChange={e=>setForm(f=>({...f,hasta:e.target.value}))}/>
            <input placeholder='Motivo' value={form.motivo} onChange={e=>setForm(f=>({...f,motivo:e.target.value}))} style={{gridColumn:'span 3'}}/>
          </div>
          <div style={{display:'flex',gap:8}}><Btn label='Enviar' onClick={enviar}/><Btn label='Cancelar' ghost onClick={()=>setShow(false)}/></div>
        </div>
      )}
      <Tabla cols={['Tipo','Desde','Hasta','Motivo','Estado']}>
        {rows.map(a=>(<tr key={a.id} style={{borderBottom:'1px solid var(--border)'}}>
          <td style={{padding:'9px 10px',fontSize:12}}>{a.tipo}</td>
          <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(a.desde)}</td>
          <td style={{padding:'9px 10px',fontSize:12,color:'var(--muted)'}}>{fmtDate(a.hasta)}</td>
          <td style={{padding:'9px 10px',fontSize:12,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.motivo}</td>
          <td style={{padding:'9px 10px'}}><Badge label={a.estado} c={a.estado==='aprobada'?'var(--accent2)':a.estado==='rechazada'?'var(--danger)':'var(--accent)'}/></td>
        </tr>))}
      </Tabla>
      {rows.length===0&&<Empty txt='Sin solicitudes'/>}
    </div>
  );
}

function Calendario({user}){
  const [mes,setMes]=useState(new Date().getMonth());
  const [anio,setAnio]=useState(new Date().getFullYear());
  const [aus,setAus]=useState([]);
  const meses=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const dias=['L','M','X','J','V','S','D'];
  useEffect(()=>{
    const desde=`${anio}-${String(mes+1).padStart(2,'0')}-01`;
    const hasta=`${anio}-${String(mes+1).padStart(2,'0')}-${new Date(anio,mes+1,0).getDate()}`;
    sb.from('ausencias').select('*,empleados(nombre)').eq('estado','aprobada').gte('desde',desde).lte('hasta',hasta).then(({data})=>setAus(data||[]));
  },[mes,anio]);
  const primerDia=new Date(anio,mes,1).getDay()||7;
  const diasMes=new Date(anio,mes+1,0).getDate();
  function ausDelDia(dia){
    const f=`${anio}-${String(mes+1).padStart(2,'0')}-${String(dia).padStart(2,'0')}`;
    return aus.filter(a=>a.desde<=f&&a.hasta>=f);
  }
  return(
    <div>
      <SH title='Calendario del equipo'/>
      <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
        <button onClick={()=>{if(mes===0){setMes(11);setAnio(a=>a-1)}else setMes(m=>m-1)}} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'6px 12px',borderRadius:4}}>←</button>
        <span style={{fontSize:15,fontWeight:'bold',flex:1,textAlign:'center'}}>{meses[mes]} {anio}</span>
        <button onClick={()=>{if(mes===11){setMes(0);setAnio(a=>a+1)}else setMes(m=>m+1)}} style={{background:'var(--surface2)',border:'1px solid var(--border)',color:'var(--text)',padding:'6px 12px',borderRadius:4}}>→</button>
      </div>
      <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16,marginBottom:20}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2,marginBottom:8}}>
          {dias.map(d=><div key={d} style={{textAlign:'center',fontSize:10,color:'var(--muted)',padding:'4px 0'}}>{d}</div>)}
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:2}}>
          {Array.from({length:primerDia-1}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:diasMes}).map((_,i)=>{
            const dia=i+1;const ad=ausDelDia(dia);
            const esHoy=new Date().getDate()===dia&&new Date().getMonth()===mes&&new Date().getFullYear()===anio;
            return(
              <div key={dia} style={{minHeight:36,borderRadius:4,padding:'3px',background:esHoy?'rgba(200,169,110,0.15)':ad.length>0?'rgba(143,184,160,0.08)':'transparent',border:esHoy?'1px solid var(--accent)':'1px solid transparent'}}>
                <div style={{fontSize:11,textAlign:'center',color:esHoy?'var(--accent)':'var(--text)',fontWeight:esHoy?'bold':'normal'}}>{dia}</div>
                {ad.slice(0,2).map((a,j)=><div key={j} style={{fontSize:9,background:COLORS[j]+'33',color:COLORS[j],borderRadius:2,padding:'1px 3px',marginTop:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{a.empleados?.nombre?.split(' ')[0]}</div>)}
                {ad.length>2&&<div style={{fontSize:9,color:'var(--muted)'}}>+{ad.length-2}</div>}
              </div>
            );
          })}
        </div>
      </div>
      {aus.length>0&&(
        <div style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
          <div style={{fontSize:10,letterSpacing:2,color:'var(--muted)',marginBottom:12,textTransform:'uppercase'}}>Ausencias del mes</div>
          {aus.map(a=>(<div key={a.id} style={{display:'flex',alignItems:'center',gap:10,padding:'7px 0',borderBottom:'1px solid var(--border)'}}><Av name={a.empleados?.nombre||'?'} size={26}/><div style={{flex:1}}><div style={{fontSize:13,fontWeight:'bold'}}>{a.empleados?.nombre}</div><div style={{fontSize:11,color:'var(--muted)'}}>{a.tipo}</div></div><div style={{fontSize:11,color:'var(--muted)',textAlign:'right'}}><div>{fmtDate(a.desde)}</div><div>{fmtDate(a.hasta)}</div></div></div>))}
        </div>
      )}
      {aus.length===0&&<Empty txt='Sin ausencias este mes'/>}
    </div>
  );
}

function EmpDocumentos({user}){
  const [docs,setDocs]=useState([]);
  useEffect(()=>{sb.from('documentos').select('*').eq('empleado_id',user.id).order('created_at',{ascending:false}).then(({data})=>setDocs(data||[]))},[user.id]);
  return(
    <div>
      <SH title='Mis documentos' sub={`${docs.length} archivos`}/>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:12}}>
        {docs.map(d=>(<div key={d.id} style={{background:'var(--surface)',border:'1px solid var(--border)',borderRadius:8,padding:16}}>
          <div style={{fontSize:28,marginBottom:10}}>📄</div>
          <div style={{fontSize:14,fontWeight:'bold',marginBottom:4}}>{d.nombre}</div>
          {d.tipo&&<Badge label={d.tipo} c='var(--info)'/>}
          {d.descripcion&&<div style={{fontSize:11,color:'var(--muted)',marginTop:6}}>{d.descripcion}</div>}
          <div style={{fontSize:10,color:'var(--muted)',marginTop:8}}>{fmtDate(d.created_at)}</div>
        </div>))}
      </div>
      {docs.length===0&&<Empty txt='El admin aún no ha añadido documentos'/>}
    </div>
  );
}

function SH({title,sub,children}){
  return(<div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:22,paddingBottom:14,borderBottom:'1px solid var(--border)'}}><div><h2 style={{fontSize:18,fontWeight:'bold',letterSpacing:1,marginBottom:2,color:'var(--text)'}}>{title}</h2>{sub&&<div style={{fontSize:10,color:'var(--muted)',letterSpacing:1,textTransform:'uppercase'}}>{sub}</div>}</div>{children}</div>);
}
function Av({name,size=32,color}){return <div style={{width:size,height:size,borderRadius:'50%',background:color||'var(--surface3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*0.35,fontWeight:'bold',color:'var(--accent)',flexShrink:0}}>{ini(name)}</div>}
function Badge({label,c}){return <span style={{fontSize:10,padding:'3px 8px',borderRadius:10,background:`${c}22`,color:c,border:`1px solid ${c}44`,letterSpacing:1,textTransform:'uppercase',whiteSpace:'nowrap'}}>{label}</span>}
function Btn({label,onClick,ghost}){return <button onClick={onClick} style={{background:ghost?'var(--surface2)':'var(--accent)',color:ghost?'var(--muted)':'#0f0f0f',padding:'7px 14px',fontSize:11,letterSpacing:1,textTransform:'uppercase',fontWeight:'bold',borderRadius:4,border:ghost?'1px solid var(--border)':'none'}}>{label}</button>}
function Tabla({cols,children}){return(<div style={{overflowX:'auto'}}><table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{borderBottom:'1px solid var(--accent)'}}>{cols.map(c=><th key={c} style={{padding:'7px 10px',textAlign:'left',fontSize:10,letterSpacing:2,color:'var(--accent)',textTransform:'uppercase',fontWeight:'normal'}}>{c}</th>)}</tr></thead><tbody>{children}</tbody></table></div>)}
function Empty({txt}){return <div style={{textAlign:'center',padding:'36px 0',color:'var(--muted)',fontSize:12,letterSpacing:2,textTransform:'uppercase'}}>{txt}</div>}
function Loading(){return <div style={{textAlign:'center',padding:'36px 0',color:'var(--muted)',fontSize:12}}>Cargando...</div>}

ReactDOM.render(<App/>,document.getElementById('root'));
</script>
